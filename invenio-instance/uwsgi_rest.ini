[uwsgi]
module         = wsgi_rest:application
chdir          = /home/YOUR_USER/invenio-rdm/src

master                    = true
single-interpreter        = true
lazy-apps                 = true
processes                 = 2
threads                   = 4
http-socket               = 127.0.0.1:5001
wsgi-disable-file-wrapper = true
thunder-lock              = true
buffer-size               = 65535
post-buffering            = 4096
req-logger                = stdio
logger                    = stdio
